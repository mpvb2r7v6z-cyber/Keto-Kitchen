            return r ? `<div style="font-size:13px;color:var(--text2);margin-bottom:4px">${MEAL_LABELS[m]}: ${r.name}</div>` : '';
          }).join('');
          return meals ? `<div style="margin-bottom:12px"><div style="font-weight:600;font-size:14px;margin-bottom:6px">${d}</div>${meals}</div>` : '';
        }).join('')}
      ` : `<div class="empty-state"><div class="empty-emoji">📅</div><div class="empty-text">Tap a slot to plan a meal</div></div>`}
    </div>
  `;
}

function openPlannerPicker(day, meal) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-title">${MEAL_LABELS[meal]} · ${day}</div>
      <div class="modal-recipe-list">
        ${state.plan[day+'_'+meal] ? `<div class="modal-recipe-item" style="border-color:var(--red)" onclick="removePlanItem('${day}','${meal}')"><span style="color:var(--red)">✕ Remove</span></div>` : ''}
        ${recipes.filter(r => !['reference','cheat sheet'].some(t=>(r.tags||[]).includes(t))).map(r => `
          <div class="modal-recipe-item" onclick="setPlanItem('${day}','${meal}',${r.id})">
            <span style="font-size:20px">${getEmoji(r)}</span>
            <div>
              <div class="modal-recipe-name">${r.name}</div>
              <div class="modal-recipe-carbs">${r.carbs}g carbs · ${r.time}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
  overlay.onclick = () => document.body.removeChild(overlay);
  document.body.appendChild(overlay);
}

function setPlanItem(day, meal, id) {
  state.plan[day+'_'+meal] = id;
  localStorage.setItem('kk_plan', JSON.stringify(state.plan));
  document.querySelectorAll('.modal-overlay').forEach(el => el.remove());
  renderPlanner();
}

function removePlanItem(day, meal) {
  delete state.plan[day+'_'+meal];
  localStorage.setItem('kk_plan', JSON.stringify(state.plan));
  document.querySelectorAll('.modal-overlay').forEach(el => el.remove());
  renderPlanner();
}

function clearPlan() {
  if (confirm('Clear entire meal plan?')) {
    state.plan = {};
    localStorage.setItem('kk_plan', JSON.stringify(state.plan));
    renderPlanner();
  }
}

// ========== SHOPPING ==========
function renderShopping() {
  const page = document.getElementById('page-shopping');
  const cats = {};
  state.shop.forEach(item => {
    if (!cats[item.cat]) cats[item.cat] = [];
    cats[item.cat].push(item);
  });
  
  page.innerHTML = `
    <div class="page-header">
      <div style="font-family:'Playfair Display',serif;font-size:24px;font-weight:700">Shopping List</div>
      <div class="page-header-actions">
        <button class="icon-btn" onclick="addShopItem()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button class="icon-btn" onclick="clearChecked()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
        </button>
      </div>
    </div>
    
    ${Object.keys(cats).length ? `
      <div class="shop-section">
        ${Object.entries(cats).map(([cat, items]) => `
          <div class="shop-cat-title">${cat}</div>
          ${items.map(item => `
            <div class="shop-item">
              <div class="shop-check ${item.checked?'checked':''}" onclick="toggleShopItem('${item.id}')">
                ${item.checked ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
              </div>
              <span class="shop-item-name ${item.checked?'done':''}">${item.name}</span>
              <button class="shop-del" onclick="deleteShopItem('${item.id}')">✕</button>
            </div>
          `).join('')}
        `).join('')}
      </div>
    ` : `<div class="empty-state"><div class="empty-emoji">🛒</div><div class="empty-text">Your shopping list is empty</div></div>`}
  `;
}

function toggleShopItem(id) {
  const item = state.shop.find(i => i.id == id);
  if (item) item.checked = !item.checked;
  localStorage.setItem('kk_shop', JSON.stringify(state.shop));
  renderShopping();
}

function deleteShopItem(id) {
  state.shop = state.shop.filter(i => i.id != id);
  localStorage.setItem('kk_shop', JSON.stringify(state.shop));
  renderShopping();
}

function clearChecked() {
  state.shop = state.shop.filter(i => !i.checked);
  localStorage.setItem('kk_shop', JSON.stringify(state.shop));
  renderShopping();
}

function addShopItem() {
  const name = prompt('Add item:');
  if (!name) return;
  state.shop.push({id: Date.now(), name, cat: catFor(name), checked: false});
  localStorage.setItem('kk_shop', JSON.stringify(state.shop));
  renderShopping();
}

// ========== CHAT ==========
function renderChat() {
  const page = document.getElementById('page-chat');
  if (page.querySelector('.chat-messages')) return; // already rendered
  
  page.innerHTML = `
    <div style="padding:16px 16px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px">
      <div style="width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:18px">🧑‍🍳</div>
      <div>
        <div style="font-family:'Playfair Display',serif;font-size:16px;font-weight:700">Chef AI</div>
        <div style="font-size:12px;color:var(--green)">● Online</div>
      </div>
      <button class="icon-btn" style="margin-left:auto" onclick="clearChat()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
      </button>
    </div>
    <div class="chat-messages" id="chatMessages">
      ${state.chatMessages.length === 0 ? `
        <div class="chat-bubble ai animate-in">
          👋 Hi! I'm your personal keto chef assistant. Ask me to suggest recipes, add them to your cookbook, plan your meals, or get advice about low-carb cooking!
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;padding:4px 0">
          ${['Suggest a keto dinner','Add a recipe for me','What can I eat tonight?','Low carb snack ideas'].map(q => 
            `<button style="padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;color:var(--text2);font-size:12px;cursor:pointer" onclick="quickAsk('${q}')">${q}</button>`
          ).join('')}
        </div>
      ` : state.chatMessages.map(m => `
        <div class="chat-bubble ${m.role} animate-in">${m.content}</div>
      `).join('')}
    </div>
    <div class="chat-input-wrap">
      <input class="chat-input" id="chatInput" placeholder="Ask your chef..." onkeydown="if(event.key==='Enter')sendChat()">
      <button class="chat-send" onclick="sendChat()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  `;
}

function quickAsk(q) {
  document.getElementById('chatInput').value = q;
  sendChat();
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const q = input.value.trim();
  if (!q) return;
  input.value = '';
  
  const msgs = document.getElementById('chatMessages');
  
  // Add user bubble
  state.chatMessages.push({role:'user', content: q});
  const userBubble = document.createElement('div');
  userBubble.className = 'chat-bubble user animate-in';
  userBubble.textContent = q;
  msgs.appendChild(userBubble);
  
  // Loading
  const loading = document.createElement('div');
  loading.className = 'chat-bubble ai';
  loading.innerHTML = '<div class="loading-dots"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>';
  msgs.appendChild(loading);
  msgs.scrollTop = msgs.scrollHeight;
  
  try {
    const res = await fetch('/.netlify/functions/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        messages: [{role:'user', content: q}],
        recipes: recipes.map(r => ({id:r.id, name:r.name, carbs:r.carbs, tags:r.tags})),
        plan: state.plan,
        shop: state.shop
      })
    });
    const data = await res.json();
    const text = data.content || 'Sorry, I could not get a response.';
    
    // Handle actions
    let displayText = text;
    if (text.includes('ACTION:')) {
      const parts = text.split('ACTION:');
      displayText = parts[0].trim();
      try {
        const action = JSON.parse(parts[1].trim());
        handleChatAction(action);
      } catch(e) {}
    }
    
    loading.innerHTML = displayText;
    state.chatMessages.push({role:'ai', content: displayText});
    localStorage.setItem('kk_chat', JSON.stringify(state.chatMessages.slice(-20)));
    
  } catch(e) {
    loading.innerHTML = 'Error connecting. Please try again.';
  }
  
  msgs.scrollTop = msgs.scrollHeight;
}

function handleChatAction(action) {
  if (action.type === 'add_recipe' && action.recipe) {
    const r = {...action.recipe, id: Date.now()};
    recipes.push(r);
    ALL.push(r);
    // Save to localStorage
    const saved = JSON.parse(localStorage.getItem('kk_extra_recipes') || '[]');
    saved.push(r);
    localStorage.setItem('kk_extra_recipes', JSON.stringify(saved));
    
    const msgs = document.getElementById('chatMessages');
    const note = document.createElement('div');
    note.style.cssText = 'text-align:center;padding:8px;font-size:12px;color:var(--green);';
    note.textContent = `✓ "${r.name}" added to your cookbook!`;
    msgs.appendChild(note);
  }
  if (action.type === 'add_to_plan') {
    const key = action.day + '_' + action.meal;
    state.plan[key] = action.recipeId;
    localStorage.setItem('kk_plan', JSON.stringify(state.plan));
  }
  if (action.type === 'add_to_shop' && action.items) {
    action.items.forEach(item => {
      state.shop.push({id: Date.now() + Math.random(), name: item.name, cat: item.cat || 'Pantry', checked: false});
    });
    localStorage.setItem('kk_shop', JSON.stringify(state.shop));
  }
}

function clearChat() {
  state.chatMessages = [];
  localStorage.removeItem('kk_chat');
  const page = document.getElementById('page-chat');
  page.innerHTML = '';
  renderChat();
}

// Load any extra recipes saved from chat
const extraRecipes = JSON.parse(localStorage.getItem('kk_extra_recipes') || '[]');
extraRecipes.forEach(r => {
  if (!recipes.find(x => x.id === r.id)) {
    recipes.push(r);
  }
});

// ========== INIT ==========
nav('home');
</script>
</body>
</html>
