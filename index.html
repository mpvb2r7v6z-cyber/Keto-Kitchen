<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Keto Kitchen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0e0d;
  --bg2: #1a1815;
  --bg3: #242220;
  --card: #1e1c1a;
  --border: #2e2b28;
  --text: #f0ece6;
  --text2: #9e9890;
  --text3: #6b6660;
  --accent: #d4a853;
  --accent2: #c4733a;
  --green: #4a8c5c;
  --red: #c45a3a;
  --blue: #4a7ab5;
  --radius: 16px;
  --radius-sm: 10px;
  --nav-h: 72px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
[data-theme="light"] {
  --bg: #f7f3ed;
  --bg2: #efe9e0;
  --bg3: #e6ddd0;
  --card: #ffffff;
  --border: #d8cfc4;
  --text: #1a1612;
  --text2: #6b5f50;
  --text3: #9e8e7a;
  --accent: #b8841e;
  --accent2: #a05828;
  --green: #2d6b3e;
  --red: #a03822;
  --blue: #2d5a8e;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;}
#app{height:100%;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative;overflow:hidden;}
.page{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(var(--nav-h) + var(--safe-bottom));-webkit-overflow-scrolling:touch;}
.page::-webkit-scrollbar{display:none;}

/* BOTTOM NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:calc(var(--nav-h) + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding-top:8px;z-index:100;backdrop-filter:blur(20px);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;padding:4px 0;transition:color 0.2s;}
.nav-btn.active{color:var(--accent);}
.nav-btn svg{width:22px;height:22px;}
.nav-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);opacity:0;transition:opacity 0.2s;}
.nav-btn.active .nav-dot{opacity:1;}

/* TYPOGRAPHY */
.display{font-family:'Playfair Display',serif;}
h1.display{font-size:32px;line-height:1.1;font-weight:900;}
h2.display{font-size:24px;line-height:1.2;font-weight:700;}

/* CARDS */
.recipe-card{background:var(--card);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;}
.recipe-card:active{transform:scale(0.97);}
.recipe-card-img{width:100%;height:160px;object-fit:cover;background:var(--bg3);display:block;}
.recipe-card-img-placeholder{width:100%;height:160px;background:linear-gradient(135deg,var(--bg3),var(--bg2));display:flex;align-items:center;justify-content:center;font-size:48px;}
.recipe-card-body{padding:14px;}
.recipe-card-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;line-height:1.3;margin-bottom:6px;}
.recipe-card-meta{display:flex;gap:10px;font-size:12px;color:var(--text2);}
.recipe-card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.tag{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.tag.active{background:var(--accent);color:#000;border-color:var(--accent);}

/* MACROS */
.macro-row{display:flex;gap:8px;}
.macro-pill{flex:1;background:var(--bg3);border-radius:var(--radius-sm);padding:10px 8px;text-align:center;}
.macro-val{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;color:var(--accent);}
.macro-lbl{font-size:10px;color:var(--text3);margin-top:2px;}

/* SEARCH */
.search-wrap{padding:12px 16px;position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--border);}
.search-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 16px 10px 40px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;}
.search-input::placeholder{color:var(--text3);}
.search-icon{position:absolute;left:28px;top:50%;transform:translateY(-50%);color:var(--text3);}
.search-wrap{position:relative;}

/* HEADER */
.page-header{padding:20px 16px 8px;display:flex;justify-content:space-between;align-items:center;}
.page-header-actions{display:flex;gap:8px;}
.icon-btn{width:38px;height:38px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);}
.icon-btn:active{opacity:0.7;}

/* TAGS SCROLL */
.tags-scroll{display:flex;gap:8px;padding:8px 16px 12px;overflow-x:auto;scrollbar-width:none;}
.tags-scroll::-webkit-scrollbar{display:none;}

/* RECIPE GRID */
.recipe-grid{padding:0 12px;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.recipe-grid .recipe-card-img-placeholder{height:120px;font-size:36px;}
.recipe-grid .recipe-card-body{padding:10px;}
.recipe-grid .recipe-card-title{font-size:13px;}

/* DETAIL PAGE */
.detail-header{position:relative;}
.detail-hero{width:100%;height:260px;object-fit:cover;background:var(--bg3);display:block;}
.detail-hero-placeholder{width:100%;height:260px;background:linear-gradient(135deg,var(--bg3),var(--bg2));display:flex;align-items:center;justify-content:center;font-size:72px;}
.detail-back{position:absolute;top:16px;left:16px;width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:white;}
.detail-fav{position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:white;}
.detail-body{padding:20px 16px;}
.detail-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;line-height:1.2;margin-bottom:12px;}
.detail-actions{display:flex;gap:10px;margin-bottom:20px;}
.btn-primary{flex:1;background:var(--accent);color:#000;border:none;border-radius:var(--radius-sm);padding:14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity 0.2s;}
.btn-primary:active{opacity:0.8;}
.btn-secondary{background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:8px;}
.scaler{display:flex;align-items:center;gap:12px;background:var(--bg2);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:20px;border:1px solid var(--border);}
.scaler-btn{width:32px;height:32px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.scaler-val{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;flex:1;text-align:center;}
.section-title{font-size:13px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;margin-top:24px;}
.ingredient-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px;}
.ingredient-item:last-child{border-bottom:none;}
.ingredient-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;}
.ingredient-check.checked{background:var(--green);border-color:var(--green);}
.step-item{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);}
.step-item:last-child{border-bottom:none;}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#000;font-family:'DM Mono',monospace;font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.step-text{font-size:14px;line-height:1.6;color:var(--text2);}

/* COOK MODE */
.cook-overlay{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;max-width:430px;left:50%;transform:translateX(-50%);}
.cook-progress-bar{height:3px;background:var(--bg3);position:relative;}
.cook-progress-fill{height:100%;background:var(--accent);transition:width 0.4s ease;}
.cook-header{padding:16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);}
.cook-close{width:36px;height:36px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cook-recipe-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cook-step-count{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;}
.cook-main{flex:1;overflow-y:auto;padding:20px 16px;}
.cook-step-card{background:var(--card);border-radius:var(--radius);padding:20px;border:1px solid var(--border);margin-bottom:16px;}
.cook-step-label{font-size:11px;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;}
.cook-step-text{font-size:17px;line-height:1.6;color:var(--text);}
.cook-ingredients-for-step{background:var(--bg2);border-radius:var(--radius-sm);padding:12px;margin-top:14px;border:1px solid var(--border);}
.cook-ing-label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;}
.cook-ing-item{font-size:13px;color:var(--text2);padding:3px 0;}

/* TIMER */
.cook-timer{background:var(--bg2);border-radius:var(--radius);padding:16px;margin-top:12px;border:1px solid var(--accent);}
.timer-display{font-family:'DM Mono',monospace;font-size:36px;font-weight:500;color:var(--accent);text-align:center;margin-bottom:12px;}
.timer-ring{position:relative;width:80px;height:80px;margin:0 auto 12px;}
.timer-ring svg{transform:rotate(-90deg);}
.timer-ring-bg{fill:none;stroke:var(--bg3);stroke-width:6;}
.timer-ring-fill{fill:none;stroke:var(--accent);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 1s linear;}
.timer-time-inside{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:var(--accent);}
.timer-btns{display:flex;gap:8px;justify-content:center;}
.timer-btn{padding:8px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;}
.timer-btn.primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600;}

/* COOK FOOTER */
.cook-footer{padding:16px;border-top:1px solid var(--border);display:flex;gap:10px;}
.cook-prev{width:52px;height:52px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;}
.cook-next{flex:1;background:var(--accent);color:#000;border:none;border-radius:var(--radius-sm);padding:16px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.cook-voice{width:52px;height:52px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cook-voice.active{background:var(--red);border-color:var(--red);color:white;}

/* SHOPPING */
.shop-section{padding:0 16px;}
.shop-cat-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;padding:16px 0 8px;}
.shop-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);font-size:14px;}
.shop-item:last-child{border-bottom:none;}
.shop-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;}
.shop-check.checked{background:var(--green);border-color:var(--green);}
.shop-item-name{flex:1;}
.shop-item-name.done{text-decoration:line-through;color:var(--text3);}
.shop-del{width:28px;height:28px;border-radius:50%;background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;}

/* PLANNER */
.planner-grid{padding:16px;display:grid;grid-template-columns:60px repeat(7,1fr);gap:4px;}
.planner-day-header{font-size:10px;font-weight:600;color:var(--text3);text-align:center;padding:4px 0;text-transform:uppercase;}
.planner-meal-label{font-size:10px;color:var(--text3);display:flex;align-items:center;padding-right:4px;}
.planner-slot{background:var(--bg2);border-radius:8px;min-height:52px;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:4px;font-size:9px;text-align:center;color:var(--text2);line-height:1.3;transition:background 0.2s;}
.planner-slot.filled{background:var(--bg3);color:var(--text);border-color:var(--accent);}
.planner-slot:hover{border-color:var(--accent);}

/* CHAT */
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
.chat-messages::-webkit-scrollbar{display:none;}
.chat-bubble{max-width:85%;padding:12px 16px;border-radius:18px;font-size:14px;line-height:1.6;}
.chat-bubble.user{align-self:flex-end;background:var(--accent);color:#000;border-radius:18px 18px 4px 18px;}
.chat-bubble.ai{align-self:flex-start;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:18px 18px 18px 4px;}
.chat-input-wrap{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:10px;background:var(--bg);}
.chat-input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:10px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;}
.chat-send{width:44px;height:44px;border-radius:50%;background:var(--accent);border:none;color:#000;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* MISC */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-emoji{font-size:48px;margin-bottom:12px;}
.empty-text{font-size:14px;}
.floating-timers{position:fixed;top:16px;right:16px;z-index:150;display:flex;flex-direction:column;gap:8px;}
.float-timer{background:var(--accent);color:#000;padding:8px 12px;border-radius:24px;font-family:'DM Mono',monospace;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:500;}
.chip.green{background:rgba(74,140,92,0.2);color:var(--green);}
.chip.orange{background:rgba(196,115,58,0.2);color:var(--accent2);}
.chip.blue{background:rgba(74,122,181,0.2);color:var(--blue);}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
.animate-in{animation:fadeIn 0.3s ease forwards;}
.slide-up{animation:slideUp 0.4s ease forwards;}

/* FAV HEART */
.fav-heart{color:var(--text3);}
.fav-heart.active{color:#e05;fill:#e05;}

/* RECENTLY COOKED */
.recent-scroll{display:flex;gap:12px;padding:8px 16px;overflow-x:auto;scrollbar-width:none;}
.recent-scroll::-webkit-scrollbar{display:none;}
.recent-card{width:130px;flex-shrink:0;background:var(--card);border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border);cursor:pointer;}
.recent-card img,.recent-card .recent-img-ph{width:100%;height:80px;object-fit:cover;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:28px;}
.recent-card-name{padding:8px;font-size:12px;font-weight:500;line-height:1.3;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:300;display:flex;align-items:flex-end;max-width:430px;left:50%;transform:translateX(-50%);}
.modal-sheet{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;padding:20px 16px;padding-bottom:calc(20px + var(--safe-bottom));max-height:80vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;margin-bottom:16px;}
.modal-recipe-list{display:flex;flex-direction:column;gap:8px;}
.modal-recipe-item{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--bg3);border-radius:var(--radius-sm);cursor:pointer;border:1px solid var(--border);}
.modal-recipe-item:active{opacity:0.7;}
.modal-recipe-name{font-size:14px;font-weight:500;}
.modal-recipe-carbs{font-size:12px;color:var(--text3);}

/* LOADING */
.loading-dots{display:flex;gap:6px;align-items:center;padding:8px 0;}
.loading-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 1.4s ease infinite;}
.loading-dot:nth-child(2){animation-delay:0.2s;}
.loading-dot:nth-child(3){animation-delay:0.4s;}

/* HERO SECTION */
.home-hero{padding:24px 16px 8px;}
.home-greeting{font-size:13px;color:var(--text3);margin-bottom:4px;}
.home-title{font-family:'Playfair Display',serif;font-size:30px;font-weight:900;line-height:1.1;}
.home-title span{color:var(--accent);}

/* STATS ROW */
.stats-row{display:flex;gap:10px;padding:16px 16px 8px;overflow-x:auto;scrollbar-width:none;}
.stat-card{flex-shrink:0;background:var(--card);border-radius:var(--radius-sm);padding:12px 16px;border:1px solid var(--border);min-width:100px;}
.stat-num{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--accent);}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:2px;}

/* THEME TOGGLE */
.theme-toggle{width:38px;height:38px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:18px;}
</style>
</head>
<body>
<div id="app">
  <!-- Floating timers -->
  <div class="floating-timers" id="floatingTimers"></div>

  <!-- Pages -->
  <div class="page" id="page-home" style="display:none"></div>
  <div class="page" id="page-recipes" style="display:none"></div>
  <div class="page" id="page-planner" style="display:none"></div>
  <div class="page" id="page-shopping" style="display:none"></div>
  <div class="page" id="page-chat" style="display:flex;flex-direction:column;display:none"></div>

  <!-- Bottom Nav -->
  <nav class="nav">
    <button class="nav-btn active" data-page="home" onclick="nav('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      Home
      <div class="nav-dot"></div>
    </button>
    <button class="nav-btn" data-page="recipes" onclick="nav('recipes')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      Recipes
      <div class="nav-dot"></div>
    </button>
    <button class="nav-btn" data-page="planner" onclick="nav('planner')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Planner
      <div class="nav-dot"></div>

   steps:['FILLING: Blitz 150g hazelnuts in Ninja in short pulses to smooth butter 60-90 secs','Mix hazelnut butter cocoa Pure Via powdered coconut oil and salt until smooth','Chill 20 mins until firm enough to handle','Roll into 12 balls with a whole hazelnut pressed into centre of each. Freeze 15 mins','WAFER OPT 1 (ALMOND): Mix ground almonds egg white butter and salt to paste. Spread paper thin on parchment. Bake 160C 8-10 mins until golden crisp. Cool break into shards','WAFER OPT 2 (COCONUT FLOUR): Mix all ingredients to thin batter. Spread paper thin. Bake 160C 10-12 mins until crisp - snaps like a real wafer','WAFER OPT 3 (EGG WHITE): Whisk whites to soft peaks fold in Pure Via and salt. Spread thin. Bake 120C 25-30 mins low and slow until completely dry and crisp','ASSEMBLY: Press wafer shards around frozen balls pressing gently. Freeze 10 more mins','Melt chocolate in bain marie or microwave 20 sec bursts stirring each time','Dip each wafer ball in chocolate let excess drip off on fork','Immediately roll in chopped hazelnuts before chocolate sets','Chill 20-30 mins until fully set. Fridge 1 week freeze 1 month','IMPORTANT: Use Lindt 85%+ dark chocolate not Sainsburys no added sugar - that uses maltitol which can spike blood sugar']},

  {id:21,name:'Cauliflower mash croquettes (air fryer)',carbs:2,protein:4,fat:6,time:'30 mins + 30 mins chilling (makes 16 mini)',tags:['side dish','air fryer','burger side','vegetarian','batch make'],

   steps:['If making fresh mash: boil cauliflower until very tender 12-15 mins. Drain and leave in colander to steam dry at least 5 mins - this is critical or croquettes will be too wet to hold together','Mash or blend cauliflower with cream cheese garlic powder onion powder salt and pepper until smooth','Stir in egg yolk and 2 tbsp ground almonds - mix well. Taste and season generously','The mix should be thick enough to hold a shape. If too wet add a little more ground almond','Cover and refrigerate 30 mins minimum - chilling firms it up and makes it much easier to shape','COATING: Mix ground almonds parmesan and crushed pork scratchings if using on a plate','Beat egg in a shallow bowl for egg wash','Preheat air fryer to 190C','Take chilled mix and roll into small logs about 4cm long and 2cm wide - cocktail sausage size. Keep them small for best crispiness and lower carbs per piece','Dip each croquette in beaten egg then roll in coating mixture pressing gently to stick all over','Place in air fryer basket in single layer - do not overcrowd or they steam instead of crisp','Air fry 190C for 12-14 mins until deep golden and crispy. Shake basket gently halfway','Rest 2 mins before serving - they firm up slightly as they cool','Serve alongside your keto burgers with any of the three burger sauces for dipping','TIP: Leftover cottage pie cauliflower mash works perfectly - already seasoned and saves time','TIP: Crushed pork scratchings in the coating give the most authentic breadcrumb crunch - zero carbs','TIP: Make a big batch and freeze before air frying - cook from frozen at 190C for 16-18 mins']},
  {id:22,name:'Keto ketchup (quick)',carbs:2,protein:0,fat:0,time:'5 mins makes 8 portions',tags:['sauce','condiment','ketchup','quick'],

   steps:['Mix all ingredients together until completely smooth','Taste - more Pure Via for sweetness more vinegar for tang','Add water gradually to get your preferred consistency','Keeps up to 2 weeks in fridge in sealed jar','TIP: Cloves allspice and cinnamon are what make this taste like real ketchup not just tomato sauce','TIP: Pure Via caster dissolves well cold - give it a good stir']},
  {id:23,name:'Keto ketchup (cooked - better flavour)',carbs:2,protein:0,fat:0,time:'25 mins makes 12 portions',tags:['sauce','condiment','ketchup','batch make'],
   ingredients:['1 tin 400g chopped tomatoes','2 tbsp tomato paste','3 tbsp apple cider vinegar','2 tbsp Pure Via caster','1 small onion very finely diced','2 garlic cloves minced','Quarter tsp ground cloves','Quarter tsp allspice','Quarter tsp cinnamon','Quarter tsp smoked paprika','Salt and black pepper','Pinch cayenne optional'],
   steps:['Fry onion in 1 tsp olive oil 5 mins until very soft','Add garlic cook 1 min','Add chopped tomatoes tomato paste and all spices stir well','Simmer uncovered low heat 15-20 mins until thickened','Blend completely smooth using Ninja or hand blender','Add apple cider vinegar and Pure Via stir well','Taste and adjust sweetness and tang','Cool then pour into sealed jar. Fridge 3 weeks or freeze in portions','TIP: Cooked version has much deeper richer flavour - worth the extra 20 mins','TIP: Blend really thoroughly for proper ketchup texture']},
  {id:24,name:'Keto BBQ sauce',carbs:3,protein:0,fat:0,time:'20 mins makes 10 portions',tags:['sauce','condiment','bbq','smoky','batch make'],
   ingredients:['4 tbsp tomato paste','2 tbsp apple cider vinegar','2 tbsp Pure Via brown sugar alternative - gives authentic BBQ depth','1 tbsp Worcestershire sauce','1 tsp smoked paprika','Half tsp garlic powder','Half tsp onion powder','Quarter tsp mustard powder','Pinch cayenne pepper','Pinch cinnamon','Salt and black pepper','3-4 tbsp water to get consistency','Optional 3-4 drops liquid smoke - makes it incredible'],
   steps:['Put all ingredients except water into small saucepan','Add water gradually until pourable sauce consistency','Bring to gentle simmer stirring constantly','Simmer 10-12 mins until slightly thickened and glossy','Taste - more Pure Via brown for sweetness more vinegar for tang more cayenne for heat','Cool before using - thickens more as it cools','Sealed jar in fridge up to 3 weeks','TIP: Pure Via brown sugar alternative is perfect here - gives genuine BBQ caramel depth','TIP: Liquid smoke transforms this completely - just 3-4 drops','TIP: Doubles as a marinade - brush on chicken or ribs before air frying','TIP: Goes brilliantly with cauliflower croquettes as a dipping sauce']},
  {id:25,name:'Homemade mayonnaise (Ninja method)',carbs:0,protein:1,fat:22,time:'5 mins makes 300ml',tags:['sauce','condiment','mayo','quick','base recipe'],
   ingredients:['2 large egg yolks at room temperature - cold eggs can cause splitting','125ml light olive oil','125ml sunflower or vegetable oil - combined in one jug ready to pour','1 tsp Dijon mustard','1 tbsp lemon juice or white wine vinegar','Half tsp salt','Pinch of Pure Via caster optional - balances the flavour','Optional pinch of white pepper'],
   steps:['Important: eggs must be room temperature - take out of fridge 30 mins before or sit in warm water 5 mins','Put egg yolks mustard lemon juice salt and Pure Via into Ninja cup','Blend on low for 10-15 seconds until combined and slightly pale','Now the key step: with blender running on low pour the combined oils in an extremely thin slow steady stream - like a thread of oil not a pour. This is what creates the emulsion','Keep pouring slowly - the whole 250ml should take about 60-90 seconds to add','As you add oil the mixture will thicken dramatically and turn pale yellow - this means it is working','Once all oil is in blend 5 more seconds until thick and glossy','Taste and adjust - more lemon for tang more salt to season','Transfer to a sealed jar. Fridge up to 1 week','TIP: If it splits (goes greasy and separated) do not throw it away - start fresh with 1 egg yolk in clean cup and slowly pour the split mixture into it as if it were oil. It will re-emulsify','TIP: The Ninja makes this almost foolproof - the key is just the slow oil pour','TIP: Half olive half sunflower gives best balance - pure olive oil can taste bitter in mayo']},
  {id:26,name:'McChicken sandwich sauce (keto)',carbs:1,protein:0,fat:10,time:'5 mins makes 4 portions',tags:['sauce','condiment','chicken burger','mcdonalds'],
   ingredients:['4 tbsp homemade mayo or full fat shop bought','1 tsp white wine vinegar','Half tsp Pure Via caster - that subtle sweetness is the key','Quarter tsp onion powder','Quarter tsp garlic powder','Pinch of white pepper - white not black for authenticity','Pinch of celery salt if available or regular salt','Half tsp lemon juice','Optional tiny pinch of paprika'],
   steps:['Mix all ingredients together until completely smooth','Taste - the balance of creamy slightly sweet and very subtly tangy is what you are going for','Add more Pure Via if not sweet enough more vinegar if not tangy enough','Rest in fridge 10 mins - flavours come together as it sits','Spread generously on both sides of bun','Keeps in fridge up to 5 days','TIP: White pepper instead of black is important - gives a cleaner more authentic flavour','TIP: The slight sweetness from Pure Via is the secret - do not skip it, that is what makes it taste like the real McChicken sauce','TIP: This also works brilliantly as a dipping sauce for your cauliflower croquettes']},
  {id:27,name:'Keto master coating mix (for nuggets fish fingers and croquettes)',carbs:1,protein:4,fat:8,time:'5 mins makes enough for 4 portions',tags:['coating','breadcrumb','base recipe','keto'],
   ingredients:['100g ground almonds','50g parmesan finely grated','30g crushed pork scratchings - blitz in Ninja 5 seconds','Half tsp salt','Half tsp black pepper'],
   steps:['Blitz pork scratchings in Ninja 5 seconds to a rough crumb - not too fine you want some texture','Mix ground almonds parmesan crushed pork scratchings salt and pepper together in a shallow bowl','This is your base coating - use as is for fish fingers or add spices for KFC nuggets (see recipes)','Make fresh each session - takes 5 mins and stays crispier than pre-mixing','TIP: The pork scratchings are the game changer - they give a crunch that ground almonds alone cannot achieve','TIP: Keep ingredients separate in the cupboard and mix to order for best results','TIP: One batch covers approximately 400g chicken nuggets OR 400g fish fingers OR 16 croquettes']},
  {id:28,name:'Keto KFC style chicken nuggets (air fryer)',carbs:2,protein:28,fat:14,time:'25 mins makes 4 portions',tags:['chicken','nuggets','kfc','air fryer','batch make','freezer friendly'],
   ingredients:['400g chicken breast cut into nugget sized pieces','BUTTERMILK MARINADE: 100ml full fat Greek yogurt or sour cream','BUTTERMILK MARINADE: 1 tbsp apple cider vinegar','BUTTERMILK MARINADE: Half tsp salt','KFC SPICE MIX: 1 batch master coating mix','KFC SPICE MIX: 1 tsp smoked paprika','KFC SPICE MIX: 1 tsp garlic powder','KFC SPICE MIX: 1 tsp onion powder','KFC SPICE MIX: Half tsp dried thyme','KFC SPICE MIX: Half tsp dried oregano','KFC SPICE MIX: Half tsp celery salt or regular salt','KFC SPICE MIX: Quarter tsp white pepper','KFC SPICE MIX: Quarter tsp cayenne pepper - adjust to taste','KFC SPICE MIX: Quarter tsp ground ginger','Light olive oil spray'],
   steps:['Cut chicken breast into nugget sized chunks - roughly 3-4cm. Try to keep them similar size so they cook evenly','MARINADE: Mix Greek yogurt apple cider vinegar and salt together. Add chicken pieces and coat well','Marinate minimum 30 mins in fridge - overnight is even better. The yogurt tenderises the chicken like buttermilk would','Mix master coating with all KFC spices together in shallow bowl','Preheat air fryer to 190C','Remove chicken from marinade letting excess drip off - do not shake off all the yogurt as it helps coating stick','Press each piece firmly into spiced coating turning to coat all sides - press the coating on so it sticks well','Place in air fryer basket in single layer - do not overcrowd. Cook in batches if needed','Spray lightly with olive oil spray - helps crisping','Air fry 190C for 12-14 mins shaking basket halfway until golden and cooked through - internal temp should be 75C','Rest 2 mins before eating - coating firms up slightly','TIP: Do not skip the marinade - it is what makes chicken breast stay juicy not dry in the air fryer','TIP: Serve with McChicken sauce Big Mac sauce or keto BBQ sauce all in your cookbook','TIP: Freeze coated uncooked nuggets on a tray then transfer to a bag. Cook from frozen 190C for 16-18 mins - perfect batch cook','TIP: The 11 herbs and spices in real KFC are a trade secret but this combination is very close']},
  {id:29,name:'Keto fish fingers (air fryer)',carbs:1,protein:20,fat:10,time:'20 mins makes 4 portions',tags:['fish','fish fingers','air fryer','batch make','freezer friendly','omega-3'],
   ingredients:['400g white fish fillets - cod haddock pollock or any firm white fish. Defrosted if frozen and patted very dry','COATING: 1 batch master coating mix','COATING: 1 tsp lemon zest optional but lovely','COATING: Half tsp dried dill or parsley','EGG WASH: 2 large eggs beaten','Salt and white pepper','Light olive oil spray'],
   steps:['Pat fish fillets very dry with kitchen paper - moisture is the enemy of crispy coating. Press firmly to remove all excess water','Cut into fish finger shapes - roughly 8-10cm long 2-3cm wide. Season lightly with salt and white pepper','Mix master coating with lemon zest and dill if using in shallow bowl','Beat eggs in separate shallow bowl','Preheat air fryer to 190C','Dip each fish finger in beaten egg letting excess drip off','Press firmly into coating on all sides - make sure fully coated with no bare patches','Place in air fryer basket in single layer - cook in batches if needed','Spray lightly with olive oil spray','Air fry 190C for 10-12 mins - fish cooks faster than chicken so watch carefully. Shake basket gently halfway','Ready when coating is golden and fish flakes easily when pressed','Serve immediately with keto ketchup tartare sauce or McChicken sauce','TIP: Pollock is the cheapest white fish and works brilliantly - look in the frozen fish section','TIP: Patting the fish completely dry is the most important step - wet fish makes soggy coating','TIP: Freeze coated uncooked fish fingers on a tray then bag them. Cook from frozen 190C for 14-15 mins','TIP: These are excellent for your liver - white fish is very low in saturated fat and high in protein','TIP: Add a squeeze of fresh lemon when serving - cuts through the richness of the coating beautifully']},
  {id:30,name:'Keto McChicken sandwich burger',carbs:4,protein:35,fat:18,time:'30 mins makes 4',tags:['chicken','burger','mcdonalds','air fryer','cottage cheese buns'],
   ingredients:['400g chicken breast - cold from fridge not frozen','SEASONING: Half tsp salt','SEASONING: Quarter tsp white pepper','SEASONING: Quarter tsp garlic powder','SEASONING: Quarter tsp onion powder','EGG WASH: 2 large eggs beaten','PLAIN COATING: 1 batch master coating mix WITHOUT the KFC spices - just ground almonds parmesan and pork scratchings','Light olive oil spray','TO SERVE: 1 batch cottage cheese buns','TO SERVE: McChicken sandwich sauce (recipe in cookbook)','TO SERVE: Shredded iceberg lettuce'],
   steps:['Cut cold chicken breast into rough chunks - cold chicken minces much better than room temperature','Pulse in Ninja in short 1-2 second bursts - about 6-8 pulses. You want a coarse mince not a paste. Stop and check between each pulse','Season mince with salt white pepper garlic powder and onion powder. Mix gently with a fork','Divide into 4 equal portions - about 100g each','Place each portion between two sheets of baking parchment and press flat into a round patty about 1cm thick and roughly the same diameter as your bun - use a round cutter or jar lid as a guide if you have one','Freeze patties flat for 15 mins - this firms them up so they hold their shape when coating','Preheat air fryer to 190C','Set up coating station: beaten egg in one shallow bowl master coating mix in another','Take chilled patty dip in egg wash coating both sides letting excess drip off','Press firmly into coating on both sides and edges - press coating on so it sticks well','Spray air fryer basket with light olive oil','Place coated patties in basket in single layer','Spray tops lightly with olive oil spray','Air fry 190C for 12-14 mins flipping carefully halfway - they are more delicate than nuggets so use a spatula','Ready when golden and coating is crispy. Check chicken is cooked through - no pink in middle','Rest 2 mins before assembling','ASSEMBLY: Slice cottage cheese bun in half','Spread McChicken sauce generously on both halves','Add shredded iceberg lettuce on bottom bun','Place crispy chicken patty on top','Top bun with extra sauce on the inside','Eat immediately','TIP: Keeping chicken cold before mincing is crucial - warm chicken turns to paste in the blender not mince','TIP: Short pulses are the secret - check after every pulse to get the right coarse texture','TIP: Freezing the patties before coating stops them falling apart when you handle them','TIP: Make extra patties and freeze uncoated between parchment sheets - coat and cook from fridge defrosted','TIP: The plain coating is more authentic to the original McChicken than the KFC spiced version']},
  {id:31,name:'Keto cucumber shake salad with spiced mince',carbs:4,protein:32,fat:24,time:'20 mins makes 1 portion',tags:['lunch','quick','salad','beef','no cook dressing'],
   ingredients:['MINCE: 150g beef mince 20% fat','MINCE: Quarter tsp garlic powder','MINCE: Quarter tsp cumin','MINCE: Quarter tsp smoked paprika','MINCE: Salt and black pepper','CUCUMBER: Half a cucumber sliced into half moons or chunks','CUCUMBER: Pinch of salt to season','TOPPINGS: Small handful cherry tomatoes halved','TOPPINGS: Quarter red onion thinly sliced','TOPPINGS: Optional handful of shredded iceberg lettuce','DRESSING: 2 tbsp full fat mayonnaise','DRESSING: 2 tbsp full fat sour cream','DRESSING: Quarter tsp garlic powder','DRESSING: Quarter tsp smoked paprika','DRESSING: Squeeze of lemon juice or splash of apple cider vinegar','DRESSING: Salt and pepper to taste','DRESSING: Optional tiny pinch of Pure Via caster to balance'],
   steps:['MINCE: Cook beef mince in a pan or air fryer over high heat breaking up as it cooks','Season with garlic powder cumin smoked paprika salt and pepper','Cook until browned and slightly crispy - a little colour on the mince adds flavour','Set aside to cool slightly - you want it warm not steaming hot when you add to the salad','DRESSING: Mix mayo sour cream garlic powder smoked paprika lemon juice and salt together until smooth','Taste - should be creamy tangy and slightly smoky. Add Pure Via if it needs balancing','ASSEMBLE: Put cucumber chunks into a large container or tub with a lid','Add cherry tomatoes red onion and lettuce if using','Add warm mince on top','Pour dressing over everything','PUT THE LID ON and shake the container a few times to coat everything in the dressing - this is the viral part','Eat straight from the container or tip into a bowl','TIP: The shake coating everything in dressing is what makes this so good - do not just stir it','TIP: Warm mince slightly wilts the cucumber and melds with the dressing - do not use cold mince','TIP: Sour cream and mayo together work better than either alone - sour cream adds sharpness mayo adds richness','TIP: This is a perfect night shift meal - quick to make filling and completely keto','TIP: Add a spoonful of your keto ketchup or BBQ sauce into the dressing for extra depth']},
  {id:32,name:'Keto blackcurrant jelly sweets',carbs:1,protein:0,fat:0,time:'15 mins + 2hrs setting (makes 20-25 squares)',tags:['sweet treat','snack','jelly','sugar free','night shift'],
   ingredients:['250ml sugar free blackcurrant squash - Robinsons no added sugar or similar, made up slightly stronger than normal drinking strength','1 and half tsp agar agar powder - this gives firm not wobbly texture','2 tbsp Pure Via caster - adjust to taste','Optional: tiny drop of purple or red food colouring for deeper colour - the squash usually gives enough colour naturally'],
   steps:['Line a small shallow tin or dish with cling film - a small tupperware or baking tin works perfectly. Smaller and deeper gives thicker squares, wider and shallower gives thinner ones','Make up blackcurrant squash slightly stronger than you would for drinking - more concentrated flavour comes through better in sweets','Pour squash into a small saucepan and add Pure Via caster. Stir over low heat until sweetener dissolves - about 1 min','Taste the liquid now - it should be quite sweet and strongly flavoured. Add more Pure Via if needed. You want it slightly sweeter than you think because setting dulls the sweetness slightly','Sprinkle agar agar powder over the surface of the liquid and whisk immediately - do not let it clump','Bring to a gentle simmer whisking constantly for 2 full minutes - this activates the agar agar properly. Do not skip the full 2 minutes or it may not set firmly','Remove from heat immediately and pour into your lined tin in an even layer','Leave to cool at room temperature 10 mins then transfer to fridge','Chill minimum 2 hours until completely firm - it will feel solid and not sticky when ready','Lift out using the cling film edges and place on a chopping board','Cut into small squares with a sharp knife - wipe knife clean between cuts for neat edges','Optional: roll squares in a tiny bit of Pure Via powdered for that classic jelly baby sugar coating look','Store in fridge in an airtight container between layers of parchment up to 1 week','TIP: The 1.5 tsp agar agar ratio is key for firm not chewy - do not reduce it','TIP: Stronger squash concentration = more flavour. Weak squash makes bland sweets','TIP: If squares are too soft next time add quarter tsp more agar agar. If too hard and rubbery reduce by quarter tsp','TIP: Rolling in Pure Via powdered at the end gives that classic jelly sweet coating and reduces stickiness','TIP: Perfect night shift sweet treat - make a batch on your day off and keep in the fridge all week','TIP: Try with other sugar free squash flavours - raspberry orange or lemon all work identically']},
  {id:33,name:'Keto deep fried battered fish',carbs:3,protein:28,fat:18,time:'25 mins serves 2',tags:['fish','deep fry','battered','chip shop','keto'],
   ingredients:['2 large white fish fillets - cod haddock or pollock patted completely dry','BATTER: 80g fine almond flour - blitz ground almonds in Ninja first','BATTER: 1 large egg','BATTER: 100ml sparkling water or soda water - ice cold from fridge','BATTER: 1 tsp baking powder','BATTER: Half tsp salt','BATTER: Quarter tsp white pepper','BATTER: Quarter tsp garlic powder','Oil for deep frying - sunflower or vegetable oil fills pan to about 8-10cm depth'],
   steps:['Pat fish fillets completely dry with kitchen paper - press firmly. Moisture is the enemy of crispy batter. Do this twice','Season fish lightly with salt and white pepper','BATTER: Mix almond flour baking powder salt pepper and garlic powder together in a bowl','Add egg and mix to a paste','Add ice cold sparkling water gradually whisking until you get a smooth batter the consistency of double cream - not too thick not too runny. The colder the water the crispier the batter','Rest batter in fridge 10 mins while oil heats - cold batter hitting hot oil creates the crispiest result','Heat oil in a deep heavy pan to 180C - test with a tiny drop of batter, if it sizzles and floats immediately the oil is ready. Do not rush this step','Dip fish fillet into batter letting excess drip off','Lower carefully into hot oil away from you - do not drop it or oil will splash','Fry 4-5 mins depending on thickness until deep golden all over. Turn once halfway if needed','Remove with slotted spoon and drain on kitchen paper','Rest 1 min before serving','Serve with keto tartare sauce keto ketchup or keto mushy peas if you make them','TIP: Ice cold sparkling water is the single most important thing for crispy light batter - do not use still water','TIP: Do not overcrowd the pan - fry one piece at a time if needed or oil temperature drops and batter goes greasy','TIP: 180C oil is crucial - too cold means greasy soggy batter, too hot means burnt outside raw inside','TIP: Almond flour batter does not go as pale golden as wheat flour - it will be slightly darker golden which is normal','TIP: Works identically with salmon for a richer version']},
  {id:34,name:'Keto deep fried battered courgette fries',carbs:4,protein:6,fat:16,time:'35 mins serves 2',tags:['vegetable','deep fry','fries','courgette','keto','side dish'],
   ingredients:['2 medium courgettes cut into thick fry shapes - about 1cm thick 8-10cm long','Salt for drawing out moisture','BATTER: 80g fine almond flour - blitz ground almonds in Ninja first','BATTER: 1 large egg','BATTER: 80ml sparkling water ice cold','BATTER: 1 tsp baking powder','BATTER: Half tsp salt','BATTER: Quarter tsp garlic powder','BATTER: Quarter tsp smoked paprika','Oil for deep frying - sunflower or vegetable oil 8-10cm depth'],
   steps:['CRITICAL STEP: Cut courgette into fry shapes and sprinkle generously with salt. Leave in colander 20-30 mins - this draws out the water that would otherwise make batter soggy','After 20-30 mins pat completely dry with kitchen paper - press really firmly. You will be surprised how much water comes out','BATTER: Mix almond flour baking powder salt garlic powder and smoked paprika','Add egg mix to paste then add ice cold sparkling water gradually until smooth batter consistency of double cream','Rest batter in fridge 10 mins while oil heats','Heat oil to 180C in deep heavy pan - test with drop of batter, should sizzle and float immediately','Working in small batches dip courgette fries in batter letting excess drip off','Lower carefully into hot oil - do not overcrowd, fry in batches of 4-5 pieces','Fry 3-4 mins until deep golden turning once halfway','Remove with slotted spoon drain on kitchen paper','Season immediately with extra salt while still hot','Serve straight away - courgette fries do not stay crispy as long as potato fries so eat immediately','Serve with keto ketchup BBQ sauce or tartare sauce','TIP: The salt and drain step is non negotiable - skip it and batter will be soggy guaranteed','TIP: Fry in small batches - overcrowding drops oil temperature and everything goes greasy','TIP: Eat immediately - courgette releases steam as it sits which softens the batter over time','TIP: Smoked paprika in the batter gives a subtle warmth that goes brilliantly with the courgette','TIP: Same batter works for deep fried battered fish - make both in the same oil session']},
  {id:35,name:'Keto hazelnut and blueberry shortbread cookies',carbs:3,protein:5,fat:16,time:'30 mins makes 12',tags:['baking','cookies','sweet treat','shortbread','hazelnut','blueberry'],
   ingredients:['150g fine almond flour - blitz ground almonds in Ninja first','50g hazelnuts - half blitzed fine in Ninja half roughly chopped for topping','100g cold butter cut into small cubes - must be cold not melted','4 tbsp Pure Via caster','1 tbsp Pure Via powdered for extra sweetness and shortbread texture','1 tsp vanilla extract','Pinch of salt','100g fresh or frozen blueberries - if frozen do not defrost','Optional: pinch of cinnamon'],
   steps:['Preheat oven to 160C - lower temperature than normal gives that classic shortbread pale golden colour without browning','Blitz half the hazelnuts in Ninja to a fine powder - add to almond flour','Roughly chop remaining hazelnuts into chunky pieces - set aside for topping','Mix fine almond flour hazelnut powder Pure Via caster Pure Via powdered salt and cinnamon if using together in a bowl','Add cold butter cubes and vanilla - rub butter into the flour mixture with your fingertips until it resembles breadcrumbs. Work quickly so butter stays cold','The mixture should just come together when pressed - if too dry add half tsp cold water. If too wet add a little more almond flour','Gently fold in blueberries - be careful not to crush them or the dough goes purple. Fold just 3-4 times','Roll into 12 balls and place on parchment lined baking tray with space between each','Press down gently into thick disc shapes about 1.5cm thick - do not press too thin or edges burn before centre cooks','Press a few chunky hazelnut pieces on top of each cookie','Bake 160C for 14-16 mins until edges are just turning golden - centre will look slightly underdone but firms up as it cools','This is important - do not overbake waiting for centre to look done or they will be too hard','Cool completely on tray - they are very fragile when warm and will fall apart if you move them too soon','Once cool they should have crispy golden edges and a softer buttery centre','Store in airtight container in fridge up to 5 days or freeze up to 1 month','TIP: Cold butter is essential for shortbread texture - melted butter makes cakey cookies not shortbread','TIP: Do not defrost frozen blueberries first - they hold their shape better when folded in frozen and burst beautifully when you eat the cookie','TIP: The double hazelnut method - fine in dough for flavour throughout plus chunky on top for crunch - gives the best of both','TIP: These are perfect night shift treats - make a batch freeze half and pull out as needed','TIP: Try with raspberries instead of blueberries for a different flavour - works identically']},
  {id:36,name:'Keto creamy mushroom soup (wisdom tooth friendly)',carbs:5,protein:6,fat:20,time:'25 mins serves 2',tags:['soup','comfort food','soft food','quick','batch make'],
   ingredients:['400g mushrooms any variety - chestnut or closed cup both work well','1 medium onion diced','3 garlic cloves minced','500ml chicken or vegetable stock - low sodium check label','150ml double cream','2 tbsp butter or olive oil','1 tsp dried thyme','Salt and white pepper - white pepper gives cleaner flavour in smooth soups','Optional: small handful of spinach for extra nutrition - blends in completely invisibly','Optional: splash of Worcestershire sauce for depth'],
   steps:['Melt butter in large pan over medium heat','Add onion and cook gently 5-6 mins until very soft - do not rush this step as soft onion gives a sweeter smoother base','Add garlic cook 1 min','Add mushrooms and thyme - cook 8-10 mins stirring occasionally until mushrooms are completely soft and have released all their moisture. They will reduce down a lot - this is normal','Season generously with salt and white pepper','Add stock and bring to gentle simmer for 5 mins','Add spinach if using and stir until wilted - about 1 min','Remove from heat and add double cream','Blend completely smooth using Ninja or hand blender - blend for a full 60 seconds until completely silky with no lumps at all','Taste and adjust seasoning - may need more salt','Reheat gently if needed - do not boil after adding cream or it can split','Serve warm not hot - important for wisdom tooth recovery','TIP: The longer you cook the mushrooms before adding stock the deeper and richer the flavour','TIP: White pepper instead of black keeps the soup a beautiful pale colour','TIP: This freezes brilliantly - make a big batch and freeze in portions before adding cream. Add cream fresh when reheating','TIP: If too thick add a splash more stock. If too thin simmer uncovered 5 more mins','TIP: Chestnut mushrooms give the deepest flavour but any mushrooms work','TIP: Serve at body temperature for the first 24 hours after tooth extraction - nothing too hot']},
  {id:37,name:'Keto creamy chicken soup',carbs:4,protein:32,fat:18,time:'30 mins serves 2',tags:['soup','chicken','comfort food','soft food','batch make'],
   ingredients:['300g chicken breast or thigh - thigh gives more flavour','1 medium onion diced','3 garlic cloves minced','500ml chicken stock low sodium','150ml double cream','2 tbsp butter or olive oil','1 stick celery diced','1 tsp dried thyme','1 tsp dried parsley','Salt and white pepper','Optional: handful of spinach blends in invisibly','Optional: 1 tsp Dijon mustard - gives lovely depth'],
   steps:['Cut chicken into chunks - does not matter what size as it gets blended','Melt butter in large pan over medium heat','Fry onion and celery gently 6-7 mins until very soft','Add garlic cook 1 min','Add chicken pieces and cook 5-6 mins turning until sealed and white on outside - does not need to be fully cooked through yet','Add thyme parsley and season well with salt and white pepper','Add stock and bring to gentle simmer','Simmer 15 mins until chicken is completely cooked through','Add spinach if using stir until wilted','Remove from heat add cream and Dijon mustard if using','Blend completely smooth using Ninja or hand blender - full 60 seconds until silky','Taste and adjust seasoning','Reheat gently if needed - do not boil after cream is added','Serve warm not hot for wisdom tooth recovery','TIP: Chicken thigh gives much richer deeper flavour than breast in soup - worth using if you have it','TIP: Dijon mustard is the secret ingredient - adds depth without tasting of mustard','TIP: Freeze before adding cream - add cream fresh when reheating for best texture','TIP: This is incredibly filling and high protein - perfect recovery food']},
  {id:38,name:'Keto creamy tomato soup',carbs:6,protein:4,fat:16,time:'25 mins serves 2',tags:['soup','tomato','comfort food','soft food','vegetarian','batch make'],
   ingredients:['2 tins 400g each chopped tomatoes','1 medium onion diced','3 garlic cloves minced','200ml chicken or vegetable stock','100ml double cream','2 tbsp butter or olive oil','1 tsp tomato paste for extra depth','1 tsp dried basil','Half tsp smoked paprika','Pinch of Pure Via caster - balances the acidity','Salt and white pepper','Optional: fresh basil if available'],
   steps:['Melt butter in large pan over medium heat','Fry onion gently 6-7 mins until very soft and slightly golden - this sweetness is important for tomato soup','Add garlic cook 1 min','Add tomato paste stir and cook 2 mins to caramelise','Add chopped tomatoes stock basil smoked paprika Pure Via caster salt and pepper','Bring to simmer and cook uncovered 15 mins stirring occasionally until slightly reduced','Remove from heat and add cream','Blend completely smooth - full 60-90 seconds. Tomato soup needs longer blending than mushroom or chicken','Pass through a sieve if you want it completely silky smooth - optional but makes it like tinned tomato soup texture','Taste and adjust - more Pure Via if too acidic more salt if flat','Reheat gently if needed - do not boil','Serve warm not hot','TIP: The pinch of Pure Via caster is essential - tomatoes are acidic and without a tiny sweetness the soup tastes sharp not rounded','TIP: Caramelising the tomato paste first adds a depth that makes it taste like it has been cooking for hours','TIP: Smoked paprika gives that classic tinned tomato soup flavour you remember from childhood','TIP: This freezes perfectly - make a big batch and freeze in portions','TIP: A swirl of cream on top before serving looks beautiful if eating with guests']},
  {id:39,name:'SLOW COOKER: Keto cottage pie mince layer',carbs:8,protein:42,fat:28,time:'Low 6-8 hrs or High 3-4 hrs (batch 6)',tags:['dinner','slow cooker','batch cook','freezer friendly','high protein'],
   ingredients:['750g beef mince 20% fat','2 medium onions diced','1 stick celery finely diced','150g mushrooms roughly chopped','1 medium carrot finely diced','2 big handfuls fresh spinach or 100g frozen squeezed dry','4 garlic cloves minced','2 tbsp tomato puree','1 tbsp Worcestershire sauce','1 Knorr beef stock pot dissolved in 200ml boiling water - less liquid than hob version as slow cooker retains moisture','1 tsp dried thyme','1 tsp dried rosemary','Salt and black pepper','1 tbsp olive oil','Make cauliflower mash separately when ready to serve'],
   steps:['Brown mince in a pan with olive oil first - do not skip this step. Browning creates flavour that slow cooking alone cannot. Drain excess fat','Transfer browned mince to slow cooker','In same pan quickly fry onion celery and carrot 3-4 mins then add to slow cooker','Add mushrooms garlic tomato puree Worcestershire sauce stock herbs salt and pepper to slow cooker','Stir everything together','LOW: Cook 6-8 hours - perfect to put on before bed and wake up to rich deep flavoured mince','HIGH: Cook 3-4 hours - good for daytime cooking','Add spinach in last 30 mins of cooking - stir in put lid back on','Make cauliflower mash fresh when ready to serve or use pre-made from fridge','Spoon mince into baking dish top with cauliflower mash and bake or air fry to get golden top if desired - or just serve as is','TIP: Less stock than hob version - slow cooker traps steam so less liquid evaporates','TIP: Browning the mince first is non negotiable - grey boiled mince has no flavour','TIP: Overnight on low is perfect for night shift workers - start before your shift end to ready mince when you wake up','TIP: Freezes brilliantly - portion into 6 containers once cooled']},
  {id:40,name:'SLOW COOKER: Keto creamy mushroom soup',carbs:5,protein:6,fat:20,time:'Low 5-6 hrs or High 2-3 hrs serves 4',tags:['soup','slow cooker','comfort food','soft food','batch make'],
   ingredients:['400g mushrooms any variety roughly chopped','1 medium onion diced','3 garlic cloves minced','500ml chicken or vegetable stock low sodium','2 tbsp butter','1 tsp dried thyme','Salt and white pepper','150ml double cream - added at end only','Optional handful spinach'],
   steps:['Add mushrooms onion garlic stock butter thyme salt and pepper to slow cooker - no pre-frying needed for this one','Stir together','LOW: Cook 5-6 hours until mushrooms are very tender and flavours have melded','HIGH: Cook 2-3 hours','Add spinach if using in last 20 mins','Remove lid and blend completely smooth using hand blender directly in slow cooker pot - or transfer to Ninja in batches','Add double cream after blending and stir through - do not cook on heat after adding cream','Taste and adjust seasoning','Serve warm not hot','TIP: Unlike the cottage pie you do not need to pre-fry anything for this soup - everything just goes in raw','TIP: Blending directly in the slow cooker pot saves washing up if using a hand blender','TIP: Make double batch - freezes perfectly before adding cream','TIP: The long slow cook gives much deeper mushroom flavour than the quick hob version']},
  {id:41,name:'SLOW COOKER: Keto creamy chicken soup',carbs:4,protein:32,fat:18,time:'Low 6-8 hrs or High 3-4 hrs serves 4',tags:['soup','chicken','slow cooker','comfort food','soft food','batch make'],
   ingredients:['400g chicken breast or thigh - thigh recommended for slow cooker as stays more moist','1 medium onion diced','3 garlic cloves minced','1 stick celery diced','500ml chicken stock low sodium','2 tbsp butter or olive oil','1 tsp dried thyme','1 tsp dried parsley','1 tsp Dijon mustard','Salt and white pepper','150ml double cream - added at end only','Optional handful spinach'],
   steps:['Add chicken pieces onion celery garlic stock butter thyme parsley Dijon mustard salt and pepper to slow cooker','Stir together - no pre-frying needed','LOW: Cook 6-8 hours - chicken will be incredibly tender and falling apart','HIGH: Cook 3-4 hours','Add spinach if using in last 20 mins','Remove chicken pieces and shred slightly with two forks - makes blending easier','Return to pot and blend completely smooth using hand blender or Ninja','Add double cream after blending stir through','Taste and adjust seasoning','Serve warm not hot','TIP: Chicken thigh is much better than breast in a slow cooker - stays moist and flavourful rather than going stringy','TIP: The long cook makes this incredibly rich and deeply flavoured - much better than the quick hob version','TIP: Perfect to put on before a night shift - ready when you wake up','TIP: Freeze before adding cream for best results when reheating']},
  {id:42,name:'SLOW COOKER: Keto creamy tomato soup',carbs:6,protein:4,fat:16,time:'Low 6-8 hrs or High 3-4 hrs serves 4',tags:['soup','tomato','slow cooker','comfort food','vegetarian','batch make'],

// ========== TIMER SYSTEM ==========
let timerIntervals = {};

function detectTimerInStep(step) {
  const patterns = [
    /(\d+)[\s-]*(?:to\s*\d+\s*)?min(?:ute)?s?/i,
    /(\d+)[\s-]*(?:to\s*\d+\s*)?hour?s?/i,
    /(\d+)[\s-]*(?:to\s*\d+\s*)?sec(?:ond)?s?/i,
  ];
  for (const p of patterns) {
    const m = step.match(p);
    if (m) {
      let secs = parseInt(m[1]);
      if (p.source.includes('hour')) secs *= 3600;
      else if (p.source.includes('min')) secs *= 60;
      return secs;
    }
  }
  return null;
}

function startTimer(id, totalSecs, label) {
  if (timerIntervals[id]) clearInterval(timerIntervals[id]);
  state.timers[id] = { total: totalSecs, remaining: totalSecs, running: true, label, paused: false };
  timerIntervals[id] = setInterval(() => {
    if (!state.timers[id] || state.timers[id].paused) return;
    state.timers[id].remaining--;
    if (state.timers[id].remaining <= 0) {
      clearInterval(timerIntervals[id]);
      alarmTimer(id);
      return;
    }
    updateTimerUI(id);
    updateFloatingTimers();
  }, 1000);
  updateFloatingTimers();
}

function pauseTimer(id) {
  if (state.timers[id]) state.timers[id].paused = !state.timers[id].paused;
  updateTimerUI(id);
}

function snoozeTimer(id) {
  if (state.timers[id]) {
    state.timers[id].remaining += 60;
    state.timers[id].paused = false;
    startTimer(id, state.timers[id].total, state.timers[id].label);
  }
}

function alarmTimer(id) {
  delete state.timers[id];
  updateFloatingTimers();
  if ('vibrate' in navigator) navigator.vibrate([300, 100, 300, 100, 300]);
  const audio = new AudioContext();
  for (let i = 0; i < 3; i++) {
    setTimeout(() => {
      const osc = audio.createOscillator();
      const gain = audio.createGain();
      osc.connect(gain); gain.connect(audio.destination);
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.3, audio.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + 0.5);
      osc.start(); osc.stop(audio.currentTime + 0.5);
    }, i * 600);
  }
  if (cookState) renderCookStep();
}

function formatTime(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function updateTimerUI(id) {
  const el = document.getElementById('timer-' + id);
  if (el && state.timers[id]) {
    const disp = el.querySelector('.timer-display');
    if (disp) disp.textContent = formatTime(state.timers[id].remaining);
    const ring = el.querySelector('.timer-ring-fill');
    if (ring) {
      const circ = 2 * Math.PI * 35;
      const progress = state.timers[id].remaining / state.timers[id].total;
      ring.style.strokeDashoffset = circ * (1 - progress);
    }
  }
}

function updateFloatingTimers() {
  const el = document.getElementById('floatingTimers');
  if (!el) return;
  el.innerHTML = Object.entries(state.timers).map(([id, t]) =>
    `<div class="float-timer" onclick="nav('${state.currentPage}')">${formatTime(t.remaining)} ⏱</div>`
  ).join('');
}

function toggleTheme() {

}

// ========== RECIPES PAGE ==========

    const notMeta = !['reference','cheat sheet'].some(t => (r.tags||[]).includes(t));

    </div>

      <input class="search-input" placeholder="Search recipes..." value="${state.searchQuery}" oninput="searchRecipes(this.value)">
    </div>
    
    <div class="tags-scroll">
      ${allTags.map(t => `<span class="tag ${state.activeTags.includes(t)?'active':''}" onclick="toggleTag('${t}')">${t}</span>`).join('')}
    </div>

}

function searchRecipes(q) {
  state.searchQuery = q;
  renderRecipes();
}

function toggleTag(tag) {
  if (state.activeTags.includes(tag)) {
    state.activeTags = state.activeTags.filter(t => t !== tag);
  } else {
    state.activeTags.push(tag);
  }
  renderRecipes();
}

function showFavorites() {
  state.activeTags = [];
  state.searchQuery = '';
  const favRecipes = recipes.filter(r => state.favorites.includes(r.id));
  const page = document.getElementById('page-recipes');
  page.innerHTML = `
    <div class="page-header">
      <button class="icon-btn" onclick="renderRecipes()">

      <div style="font-family:'Playfair Display',serif;font-size:20px;font-weight:700">Favourites ❤️</div>
      <div style="width:38px"></div>
    </div>
    ${favRecipes.length ? `
      <div class="recipe-grid">
        ${favRecipes.map(r => recipeCardSmallHtml(r)).join('')}
      </div>
    ` : `<div class="empty-state"><div class="empty-emoji">💔</div><div class="empty-text">No favourites yet</div></div>`}
  `;
}

// ========== DETAIL PAGE ==========
function showDetail(id) {
  const r = recipes.find(x => x.id === id);
  if (!r) return;
  
  const page = document.getElementById('page-' + state.currentPage);
  page.scrollTo(0, 0);
  
  const isFav = state.favorites.includes(id);
  const scaledIngredients = scaleIngredients(r.ingredients, state.scale);
  
  page.innerHTML = `
    <div class="detail-header">
      <img class="detail-hero" src="${getUnsplashUrl(r, 800, 500)}" alt="${r.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">

      <button class="detail-back" onclick="nav('${state.currentPage}')">

      </button>
      <button class="detail-fav fav-heart ${isFav?'active':''}" onclick="toggleFav(${id})">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="${isFav?'#ee0055':'none'}" stroke="${isFav?'#ee0055':'white'}" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
      </button>
    </div>
    
    <div class="detail-body">
      <div class="detail-title">${r.name}</div>
      
      <div class="macro-row" style="margin-bottom:16px">
        <div class="macro-pill"><div class="macro-val">${r.carbs}g</div><div class="macro-lbl">Net Carbs</div></div>
        <div class="macro-pill"><div class="macro-val">${r.protein}g</div><div class="macro-lbl">Protein</div></div>
        <div class="macro-pill"><div class="macro-val">${r.fat}g</div><div class="macro-lbl">Fat</div></div>
        <div class="macro-pill"><div class="macro-val">${r.time.split(' ')[0]}</div><div class="macro-lbl">${r.time.split(' ').slice(1).join(' ')||'mins'}</div></div>

        <button class="scaler-btn" onclick="setScale(${id}, ${Math.max(0.5, state.scale - 0.5)})">−</button>
        <div class="scaler-val">${state.scale}x</div>
        <button class="scaler-btn" onclick="setScale(${id}, ${state.scale + 0.5})">+</button>
      </div>
      
      <div class="detail-actions">
        <button class="btn-primary" onclick="startCook(${id})">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Cook Now
        </button>
        <button class="btn-secondary" onclick="addToShop(${id})">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          Shop
        </button>
      </div>
      
      <div class="recipe-card-tags">
        ${(r.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}
      </div>
      
      <div class="section-title" style="margin-top:20px">Ingredients</div>
      <div id="ingredients-list">
        ${scaledIngredients.map((ing,i) => `
          <div class="ingredient-item">
            <div class="ingredient-check" id="ing-check-${i}" onclick="toggleIngCheck(${i})"></div>
            <span id="ing-text-${i}">${ing}</span>
          </div>
        `).join('')}
      </div>
      
      <div class="section-title">Steps</div>
      ${(r.steps||[]).map((step,i) => {
        const timerSecs = detectTimerInStep(step);
        return `
          <div class="step-item">
            <div class="step-num">${i+1}</div>
            <div>
              <div class="step-text">${step}</div>
              ${timerSecs ? `<button style="margin-top:8px;padding:6px 12px;background:var(--accent);color:#000;border:none;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer" onclick="startTimer('detail-${i}', ${timerSecs}, 'Step ${i+1}')">⏱ Start ${formatTime(timerSecs)} timer</button>` : ''}
              <div id="timer-detail-${i}"></div>
            </div>
          </div>`;
      }).join('')}
      
      <div style="height:20px"></div>
    </div>
  `;
}

function setScale(id, newScale) {
  state.scale = Math.max(0.5, Math.min(4, newScale));
  showDetail(id);
}

function scaleIngredients(ingredients, scale) {
  if (scale === 1) return ingredients;
  return ingredients.map(ing => {
    return ing.replace(/(\d+(?:\.\d+)?)/g, (match) => {
      const num = parseFloat(match) * scale;
      return Number.isInteger(num) ? num : num.toFixed(1);
    });
  });
}

function toggleIngCheck(i) {
  const check = document.getElementById('ing-check-' + i);
  const text = document.getElementById('ing-text-' + i);
  if (check) check.classList.toggle('checked');
  if (text) text.style.textDecoration = check.classList.contains('checked') ? 'line-through' : '';
  if (text) text.style.color = check.classList.contains('checked') ? 'var(--text3)' : '';
}

function toggleFav(id) {
  if (state.favorites.includes(id)) {
    state.favorites = state.favorites.filter(f => f !== id);
  } else {
    state.favorites.push(id);
  }
  localStorage.setItem('kk_favs', JSON.stringify(state.favorites));
  showDetail(id);
}

function addToShop(id) {
  const r = recipes.find(x => x.id === id);
  if (!r) return;
  (r.ingredients||[]).forEach(ing => {
    if (!state.shop.find(i => i.name === ing)) {
      state.shop.push({id: Date.now() + Math.random(), name: ing, cat: catFor(ing), checked: false});
    }
  });
  localStorage.setItem('kk_shop', JSON.stringify(state.shop));
  // Brief confirmation
  const btn = document.querySelector('.btn-secondary');
  if (btn) { btn.textContent = '✓ Added!'; setTimeout(() => btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg> Shop', 1500); }
}

function catFor(ing) {
  const i = ing.toLowerCase();
  if (/egg|butter|cream|cheese|milk|mascarpone|cottage/.test(i)) return 'Dairy & Eggs';
  if (/salmon|chicken|beef|mince|bacon|turkey|tuna|sausage|pork|fish|cod/.test(i)) return 'Meat & Fish';
  if (/broccoli|cauliflower|spinach|lettuce|avocado|courgette|pepper|onion|garlic|kale|cabbage|mushroom|tomato|cucumber|celery|carrot/.test(i)) return 'Vegetables';
  if (/almond|walnut|hazelnut|brazil|cashew|nut|flax|coconut/.test(i)) return 'Nuts & Seeds';
  return 'Pantry';
}

// ========== COOK MODE ==========
function startCook(id) {
  const r = recipes.find(x => x.id === id);
  if (!r) return;
  
  // Add to recent
  state.recent = [id, ...state.recent.filter(x => x !== id)].slice(0, 10);
  localStorage.setItem('kk_recent', JSON.stringify(state.recent));
  
  cookState = {
    recipe: r,
    step: 0,
    checkedIngredients: new Set(),
  };
  
  // Wake lock
  if ('wakeLock' in navigator) {
    navigator.wakeLock.request('screen').catch(() => {});
  }
  
  renderCookMode();
}

function renderCookMode() {
  const el = document.getElementById('cookMode');
  el.style.display = 'flex';
  el.style.flexDirection = 'column';
  el.style.position = 'fixed';
  el.style.inset = '0';
  el.style.zIndex = '200';
  el.style.background = 'var(--bg)';
  el.style.maxWidth = '430px';
  el.style.left = '50%';
  el.style.transform = 'translateX(-50%)';
  
  const r = cookState.recipe;
  const totalSteps = (r.steps||[]).length;
  const progress = ((cookState.step) / totalSteps * 100).toFixed(0);
  
  el.innerHTML = `
    <div class="cook-progress-bar">
      <div class="cook-progress-fill" style="width:${progress}%"></div>
    </div>
    <div class="cook-header">
      <button class="cook-close" onclick="closeCook()">✕</button>
      <div class="cook-recipe-name">${r.name}</div>
      <div class="cook-step-count">${cookState.step + 1}/${totalSteps}</div>
      <button class="cook-voice ${state.voiceEnabled?'active':''}" onclick="toggleVoice()" title="Voice">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 010 7.07"/></svg>
      </button>
    </div>
    <div class="cook-main" id="cookMain"></div>
    <div class="cook-footer">
      <button class="cook-prev" onclick="cookPrev()" ${cookState.step===0?'disabled style="opacity:0.3"':''}>←</button>
      <button class="cook-next" onclick="cookNext()">
        ${cookState.step >= totalSteps - 1 ? '🎉 Done!' : 'Next Step →'}
      </button>
    </div>
  `;
  
  renderCookStep();
}

function renderCookStep() {
  const main = document.getElementById('cookMain');
  if (!main || !cookState) return;
  
  const r = cookState.recipe;
  const step = r.steps[cookState.step];
  const stepIdx = cookState.step;
  const timerSecs = detectTimerInStep(step);
  const timerId = 'cook-' + stepIdx;
  const timerState = state.timers[timerId];
  
  // Find ingredients mentioned in this step
  const stepIngredients = (r.ingredients||[]).filter(ing => {
    const words = ing.toLowerCase().split(/[\s,]+/).filter(w => w.length > 3);
    return words.some(w => step.toLowerCase().includes(w));
  });
  
  main.innerHTML = `
    <div class="cook-step-card slide-up">
      <div class="cook-step-label">Step ${stepIdx + 1}</div>
      <div class="cook-step-text">${step}</div>
      
      ${stepIngredients.length ? `
        <div class="cook-ingredients-for-step">
          <div class="cook-ing-label">Ingredients for this step</div>
          ${stepIngredients.map(ing => `<div class="cook-ing-item">• ${ing}</div>`).join('')}
        </div>
      ` : ''}
      
      ${timerSecs ? `
        <div class="cook-timer" id="timer-${timerId}">
          <div class="timer-ring">
            <svg width="80" height="80">
              <circle class="timer-ring-bg" cx="40" cy="40" r="35"/>
              <circle class="timer-ring-fill" cx="40" cy="40" r="35"
                stroke-dasharray="${2 * Math.PI * 35}"
                stroke-dashoffset="${timerState ? (2 * Math.PI * 35 * (1 - timerState.remaining / timerState.total)) : 0}"/>
            </svg>
            <div class="timer-time-inside">${timerState ? formatTime(timerState.remaining) : formatTime(timerSecs)}</div>
          </div>
          <div class="timer-display">${timerState ? formatTime(timerState.remaining) : formatTime(timerSecs)}</div>
          <div class="timer-btns">
            ${!timerState ? `<button class="timer-btn primary" onclick="startTimer('${timerId}', ${timerSecs}, 'Step ${stepIdx+1}')">▶ Start</button>` : `
              <button class="timer-btn" onclick="pauseTimer('${timerId}')">${timerState.paused ? '▶ Resume' : '⏸ Pause'}</button>
              <button class="timer-btn" onclick="snoozeTimer('${timerId}')">+1 min</button>
            `}
          </div>
        </div>
      ` : ''}
    </div>
    
    <div style="padding:4px 0">
      <div class="section-title">All Ingredients</div>
      ${(r.ingredients||[]).map((ing, i) => `
        <div class="ingredient-item">
          <div class="ingredient-check ${cookState.checkedIngredients.has(i)?'checked':''}" onclick="toggleCookIng(${i})">
            ${cookState.checkedIngredients.has(i) ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
          </div>
          <span style="${cookState.checkedIngredients.has(i)?'text-decoration:line-through;color:var(--text3)':''}">${ing}</span>
        </div>
      `).join('')}
    </div>
  `;
  
  // Voice announcement
  if (state.voiceEnabled && 'speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(`Step ${stepIdx + 1}. ${step}`);
    utt.rate = 0.9;
    window.speechSynthesis.speak(utt);
  }
}

function toggleCookIng(i) {
  if (cookState.checkedIngredients.has(i)) {
    cookState.checkedIngredients.delete(i);
  } else {
    cookState.checkedIngredients.add(i);
  }
  renderCookStep();
}

function cookNext() {
  if (!cookState) return;
  const total = cookState.recipe.steps.length;
  if (cookState.step >= total - 1) {
    closeCook();
    return;
  }
  cookState.step++;
  renderCookMode();
}

function cookPrev() {
  if (!cookState || cookState.step === 0) return;
  cookState.step--;
  renderCookMode();
}

function closeCook() {
  document.getElementById('cookMode').style.display = 'none';
  cookState = null;
}

function toggleVoice() {
  state.voiceEnabled = !state.voiceEnabled;
  const btn = document.querySelector('.cook-voice');
  if (btn) btn.classList.toggle('active', state.voiceEnabled);
}

        ${DAYS.map(d => {
